server:
    port: 8081
spring:
  application:
    name: inventoryservice

  datasource:
    url: jdbc:h2:mem:inventory-db
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update

  h2:
    console:
      enabled: true
      path: /h2-console